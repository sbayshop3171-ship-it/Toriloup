name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_ENV: testing
  VITE_API_KEY: testing-key
  DB_CONNECTION: mysql
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_DATABASE: toriloup_testing
  DB_USERNAME: root
  DB_PASSWORD: root
  CACHE_STORE: array
  SESSION_DRIVER: array
  QUEUE_CONNECTION: sync
  SAAS_MARKETING_HOST: company.com
  SAAS_OWNER_HOST: owner.company.com
  SAAS_MERCHANT_HOST: merchant.company.com
  SAAS_STOREFRONT_SUFFIX: company.com

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

  tests:
    name: Tests (${{ matrix.suite.name }})
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: toriloup_testing
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: Unit
            path: tests/Unit
          - name: Basic Feature
            path: tests/Feature/ExampleTest.php
          - name: SaaS Foundation
            path: tests/Feature/SaasFoundationTest.php
          - name: Platform Workspace
            path: tests/Feature/PlatformWorkspaceTest.php
          - name: Billing Workspace
            path: tests/Feature/BillingWorkspaceTest.php
          - name: Merchant Isolation
            path: tests/Feature/MerchantTenantIsolationTest.php

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: bcmath, ctype, curl, dom, exif, fileinfo, filter, gd, intl, json, mbstring, openssl, pdo, pdo_mysql, pdo_sqlite, simplexml, sodium, tokenizer, xml, xmlreader, xmlwriter, zip
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Run test suite
        run: |
          set +e
          php artisan test "${{ matrix.suite.path }}" --env=testing --stop-on-failure 2>&1 | tee test-output.log
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            echo "::group::Failing test output"
            tail -200 test-output.log
            echo "::endgroup::"

            {
              echo "### Failed suite: ${{ matrix.suite.name }}"
              echo
              echo '```text'
              tail -200 test-output.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            tail -120 test-output.log | tac | head -40 | while IFS= read -r line; do
              safe_line="${line//'%'/'%25'}"
              safe_line="${safe_line//$'\r'/'%0D'}"
              safe_line="${safe_line//$'\n'/'%0A'}"
              echo "::error title=${{ matrix.suite.name }}::$safe_line"
            done
          fi

          exit "$status"
