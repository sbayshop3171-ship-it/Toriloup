name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  php_syntax:
    name: PHP Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Lint PHP files
        run: |
          find app bootstrap config database routes tests -type f -name '*.php' -print0 \
            | xargs -0 -n1 php -l

  language_json:
    name: Language JSON Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate translation JSON files
        run: |
          find resources/js/languages -type f -name '*.json' -print0 \
            | xargs -0 -n1 jq empty
