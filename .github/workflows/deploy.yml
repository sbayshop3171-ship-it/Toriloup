name: Deploy Live

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-live-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy To Toriloup Server
    runs-on: ubuntu-latest

    env:
      DEPLOY_PATH: /var/www/toriloup/data/www/platform
      REMOTE_RELEASE_PATH: /var/www/toriloup/data/www/platform/storage/app/deploy/incoming/${{ github.sha }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize deploy defaults
        run: |
          set -euo pipefail
          echo "SSH_PORT=${SSH_PORT:-22}" >> "$GITHUB_ENV"

      - name: Validate deploy secrets
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=0

          for name in SSH_HOST SSH_USER SSH_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing secret::$name is empty or not set."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Clear stale maintenance lock
        run: |
          set -euo pipefail
          ssh -p "$SSH_PORT" -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" "set -euo pipefail; if [ -d '$DEPLOY_PATH' ]; then cd '$DEPLOY_PATH'; php artisan up >/dev/null 2>&1 || true; rm -f '$DEPLOY_PATH/storage/framework/down'; fi"

      - name: Prepare remote staged release
        run: |
          set -euo pipefail
          ssh -p "$SSH_PORT" -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" "set -euo pipefail; rm -rf '$REMOTE_RELEASE_PATH'; mkdir -p '$REMOTE_RELEASE_PATH'"

      - name: Upload source to staged release
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='.env' \
            --exclude='public/hot' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='storage' \
            --exclude='bootstrap/cache/*' \
            -e "ssh -p $SSH_PORT -i ~/.ssh/deploy_key" \
            ./ "$SSH_USER@$SSH_HOST:$REMOTE_RELEASE_PATH/"

      - name: Deploy with hardened server script
        run: |
          set -euo pipefail
          ssh -p "$SSH_PORT" -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" "set -euo pipefail; find '$REMOTE_RELEASE_PATH/scripts' -type f -name '*.sh' -exec chmod +x {} \\; ; APP_DIR='$DEPLOY_PATH' SOURCE_DIR='$REMOTE_RELEASE_PATH' SKIP_GIT_SYNC=1 MAINTENANCE_MODE=0 DEPLOY_COMMIT_SHA='${GITHUB_SHA}' bash '$REMOTE_RELEASE_PATH/scripts/deploy-live.sh'"
