name: Deploy Live

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-live-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy To Toriloup Server
    if: ${{ github.event_name == 'workflow_dispatch' || vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest

    env:
      DEPLOY_PATH: /var/www/toriloup/data/www/platform
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT || '22' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=0

          for name in SSH_HOST SSH_USER SSH_PORT SSH_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing secret::$name is empty or not set."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload source
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='storage/logs/*' \
            --exclude='bootstrap/cache/*' \
            -e "ssh -p $SSH_PORT -i ~/.ssh/deploy_key" \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Install, migrate, and optimize
        run: |
          set -euo pipefail
          ssh -p "$SSH_PORT" -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" <<'SCRIPT'
            set -euo pipefail
            cd /var/www/toriloup/data/www/platform

            if [ ! -f .env ]; then
              echo "::error title=Missing .env::Production .env is required before deploy."
              exit 1
            fi

            composer install --no-dev --optimize-autoloader --no-interaction
            npm ci --include=dev --no-audit --no-fund
            npm run build

            php artisan migrate --force
            php artisan storage:link || true
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
          SCRIPT
